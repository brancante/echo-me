<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="30" fill="url(#bg)"/>

  <circle cx="220" cy="180" r="120" fill="#22D3EE" opacity="0.25" filter="url(#blur)"/>
  <circle cx="920" cy="720" r="160" fill="#34D399" opacity="0.18" filter="url(#blur)"/>

  <rect x="80" y="90" width="1040" height="720" rx="28" fill="#0F172A" stroke="#334155"/>

  <g>
    <circle cx="350" cy="400" r="150" fill="#111827" stroke="#4B5563"/>
    <circle cx="350" cy="360" r="55" fill="#1F2937"/>
    <rect x="255" y="430" width="190" height="120" rx="55" fill="#1F2937"/>

    <circle cx="350" cy="360" r="78" stroke="url(#accent)" stroke-width="4" opacity="0.85"/>
    <circle cx="350" cy="360" r="105" stroke="#22D3EE" stroke-opacity="0.3" stroke-width="2"/>
    <circle cx="350" cy="360" r="130" stroke="#34D399" stroke-opacity="0.2" stroke-width="2"/>
  </g>

  <g>
    <rect x="560" y="220" width="470" height="90" rx="14" fill="#111827" stroke="#374151"/>
    <text x="590" y="273" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="28">Hi! I can answer in your cloned voice.</text>

    <rect x="620" y="340" width="410" height="90" rx="14" fill="#0B3B2E" stroke="#34D399"/>
    <text x="650" y="393" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="28">Generating avatar reply...</text>

    <rect x="560" y="460" width="470" height="220" rx="20" fill="#111827" stroke="#374151"/>
    <rect x="590" y="510" width="360" height="16" rx="8" fill="#22D3EE" opacity="0.8"/>
    <rect x="590" y="544" width="300" height="16" rx="8" fill="#34D399" opacity="0.8"/>
    <rect x="590" y="578" width="340" height="16" rx="8" fill="#60A5FA" opacity="0.8"/>

    <text x="590" y="498" fill="#9CA3AF" font-family="Inter, Arial, sans-serif" font-size="20">Voice + Avatar Pipeline</text>
  </g>

  <text x="110" y="155" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600">Echo Me Preview</text>
</svg>
